<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Letter</title>
  <!-- Import a cool modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #111;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px; /* small padding for phones */
    }

    .container, #letterPage {
      border-radius: 20px;
      padding: 20px;
      max-width: 600px;
      width: 100%; /* full width on phones */
      background: #fff;
      color: #222;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25),
                  0 12px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1s ease forwards;
    }

    .container {
      text-align: center;
    }

    #letterPage {
      display: none;
      line-height: 1.6;
      font-size: 15px; /* slightly smaller for phones */
    }

    h1 {
      font-size: 20px; /* smaller heading for phones */
      margin-bottom: 12px;
      color: #111;
      text-align: center;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    input {
      display: block;
      margin: 12px auto;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 14px;
      width: 90%; /* wider input on phones */
      text-align: center;
    }

    button {
      display: block;
      margin: 10px auto 0;
      padding: 10px 20px;
      background: linear-gradient(135deg, #222, #444);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #444, #666);
      transform: translateY(-2px);
    }

    #error {
      color: #b22222;
      font-weight: bold;
      margin-top: 8px;
      text-align: center;
      display: none;
      font-size: 13px;
    }

    .signature {
      margin-top: 15px;
      text-align: right;
      font-style: italic;
      color: #555;
      font-size: 13px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .word {
      opacity: 0;
      transition: opacity 0.5s ease;
      display: inline-block;
      margin-right: 4px;
    }
    .word.show {
      opacity: 1;
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .container, #letterPage {
        padding: 15px;
      }
      h1 {
        font-size: 18px;
      }
      #letterPage {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <!-- Page 1: Password -->
  <div class="container" id="passwordPage">
    <h1>Enter Password</h1>
    <input type="text" id="password" placeholder="Hint: what word you remember of me">
    <button onclick="unlockLetter()">CLICK</button>
    <div id="error">Invalid password. Try again.</div>
  </div>

  <!-- Page 2: Letter -->
  <div id="letterPage">
    <h1></h1>
    <p id="animatedText"></p>
    <div class="signature">— From Someone Who Named Rence</div>
    <audio id="bgMusic" src="Coldplay - Sparks - Instrumental (NO VOICE!).mp3" preload="auto"></audio>
  </div>

  <script>
    function unlockLetter() {
      const input = document.getElementById("password").value.trim().toLowerCase();
      const validPasswords = ["lisudsad", "lisudpud", "lisud sad", "lisud pud"];
      const passwordPage = document.getElementById("passwordPage");
      const letterPage = document.getElementById("letterPage");
      const error = document.getElementById("error");

      if (validPasswords.includes(input)) {
        error.style.display = "none";
        passwordPage.style.display = "none";
        letterPage.style.display = "block";
        animateText();
        playMusic();
      } else {
        error.style.display = "block";
      }
    }

    function animateText() {
      const text = `Ahhh, so in that word… yes, I know, that’s why I chose it to be the password, hahaha. Buti na-open mo! Do you hear the music? I really hope it works, kasi ang tagal ko rin nag-ayos nito, potek nayan.

Anyway, I just want to say something important. Please, have enough sleep po. Don’t push yourself too hard and don’t stress too much. Life can be heavy sometimes, but your health and peace of mind should always come first. Take care of yourself always, okay?

I’m happy you opened this letter, because it means you remembered me. That alone makes me smile. So please, keep going, but also give yourself time to rest. You deserve it.`;

      const words = text.split(" ");
      const animatedText = document.getElementById("animatedText");
      animatedText.innerHTML = "";

      words.forEach((word, i) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;
        animatedText.appendChild(span);

        setTimeout(() => {
          span.classList.add("show");
        }, i * 200);
      });
    }

    function playMusic() {
      const music = document.getElementById("bgMusic");
      music.play();
    }
  </script>
</body>
</html>
